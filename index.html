// ─── TAX REPORT EXPORT ───
function exportTaxReport(collectionMap, ownedDetails, forSaleDetails, preorderDetails, soldDetails, currency, dateFrom, dateTo) {
  const wb = XLSX.utils.book_new();
  const currSymbol = (CURRENCIES[currency]?.symbol) || "$";
  const dFrom = dateFrom ? new Date(dateFrom + "T00:00:00") : null;
  const dTo = dateTo ? new Date(dateTo + "T23:59:59") : null;
  const inRange = (dateStr) => {
    if (!dFrom && !dTo) return true;
    if (!dateStr) return !dFrom;
    const d = new Date(dateStr);
    if (isNaN(d)) return true;
    if (dFrom && d < dFrom) return false;
    if (dTo && d > dTo) return false;
    return true;
  };

  const purchaseRows = [];
  Object.entries(collectionMap).forEach(([sku, status]) => {
    if (status !== "owned" && status !== "preorder" && status !== "sold") return;
    const fig = FIGURES_DB.find(f => f.code === sku);
    const cat = CATALOG.find(c => c.sku === sku);
    const name = fig?.name || cat?.name || sku;
    const series = fig?.series || cat?.series || "";

    if (status === "sold") {
      const d = soldDetails?.[sku] || {};
      if (!inRange(d.soldDate)) return;
      purchaseRows.push({
        "SKU": sku,
        "Figure Name": name,
        "Series": series,
        "Type": "Sold",
        "Sold Price": d.soldPrice || 0,
        "Price Paid": d.costBasis || 0,
        "Notes": d.notes || ""
      });
    } else if (status === "owned") {
      const copies = ownedDetails?.[sku] || [{}];
      copies.forEach((copy, i) => {
        if (!inRange(copy?.purchaseDate)) return;
        purchaseRows.push({
          "SKU": sku,
          "Figure Name": name,
          "Series": series,
          "Type": "Owned",
          "Copy #": copies.length > 1 ? i + 1 : 1,
          "Price Paid": copy?.pricePaid || 0,
          "Purchase Date": copy?.purchaseDate || "",
          "Purchased From": copy?.purchaseFrom || "",
          "Condition": copy?.condition || "",
          "Notes": copy?.notes || ""
        });
      });
    } else if (status === "preorder") {
      const copies = preorderDetails?.[sku] || [{}];
      copies.forEach((copy, i) => {
        if (!inRange(copy?.date)) return;
        purchaseRows.push({
          "SKU": sku,
          "Figure Name": name,
          "Series": series,
          "Type": "Pre-Order",
          "Price Paid": copy?.deposit || 0,
          "Purchase Date": copy?.date || "",
          "Purchased From": copy?.retailer || "",
          "Notes": copy?.notes || ""
        });
      });
    }
  });

  if (purchaseRows.length) {
    const totalPricePaid = purchaseRows.reduce((s, r) => s + (r["Price Paid"] || 0), 0);
    purchaseRows.push({ "SKU": "", "Figure Name": "TOTAL", "Series": "", "Type": "", "Price Paid": totalPricePaid, "Notes": "" });
  }
  const wsP = XLSX.utils.json_to_sheet(purchaseRows.length ? purchaseRows : [{ "SKU": "", "Figure Name": "No purchases recorded", "Series": "", "Price Paid": "" }]);
  wsP["!cols"] = [{ wch: 10 }, { wch: 35 }, { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 20 }, { wch: 15 }, { wch: 25 }];
  XLSX.utils.book_append_sheet(wb, wsP, "Purchases");

  const saleRows = [];
  Object.entries(forSaleDetails || {}).forEach(([sku, details]) => {
    if (!inRange(details?.listedDate)) return;
    const fig = FIGURES_DB.find(f => f.code === sku);
    const cat = CATALOG.find(c => c.sku === sku);
    const name = fig?.name || cat?.name || sku;
    const series = fig?.series || cat?.series || "";
    const copies = ownedDetails?.[sku] || [{}];
    const costBasis = copies[0]?.pricePaid || 0;
    const askingPrice = details?.askingPrice || 0;

    saleRows.push({
      "SKU": sku,
      "Figure Name": name,
      "Series": series,
      "Asking Price": askingPrice,
      "Cost Basis": costBasis,
      "Est. Profit/Loss": askingPrice > 0 && costBasis > 0 ? askingPrice - costBasis : "",
      "Condition": details?.condition || "",
      "Listed Date": details?.listedDate || "",
      "Notes": details?.notes || ""
    });
  });
  const wsS = XLSX.utils.json_to_sheet(saleRows.length ? saleRows : [{ "SKU": "", "Figure Name": "No listings recorded", "Series": "", "Asking Price": "" }]);
  wsS["!cols"] = [{ wch: 10 }, { wch: 35 }, { wch: 10 }, { wch: 14 }, { wch: 12 }, { wch: 14 }, { wch: 15 }, { wch: 14 }, { wch: 25 }];
  XLSX.utils.book_append_sheet(wb, wsS, "Active Listings");

  const soldRows = [];
  Object.entries(soldDetails || {}).forEach(([sku, d]) => {
    if (!inRange(d.soldDate)) return;
    const fig = FIGURES_DB.find(f => f.code === sku);
    const cat = CATALOG.find(c => c.sku === sku);
    const name = fig?.name || cat?.name || sku;
    const series = fig?.series || cat?.series || "";
    const netProfit = (d.soldPrice || 0) - (d.costBasis || 0) - (d.platformFees || 0) - (d.shippingCost || 0);
    soldRows.push({
      "SKU": sku,
      "Figure Name": name,
      "Series": series,
      "Sold Price": d.soldPrice || 0,
      "Cost Basis": d.costBasis || 0,
      "Platform Fees": d.platformFees || 0,
      "Shipping Cost": d.shippingCost || 0,
      "Net Profit": netProfit,
      "Sale Date": d.soldDate || "",
      "Notes": d.notes || ""
    });
  });
  const wsSold = XLSX.utils.json_to_sheet(soldRows.length ? soldRows : [{ "SKU": "", "Figure Name": "No completed sales", "Series": "", "Sold Price": "" }]);
  wsSold["!cols"] = [{ wch: 10 }, { wch: 35 }, { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 25 }];
  XLSX.utils.book_append_sheet(wb, wsSold, "Completed Sales");

  const totalPurchases = purchaseRows.filter(r => r["Figure Name"] !== "TOTAL").reduce((s, r) => s + (r["Price Paid"] || 0), 0);
  const totalAsking = saleRows.reduce((s, r) => s + (r["Asking Price"] || 0), 0);
  const ownedCount = purchaseRows.filter(r => r.Type === "Owned").length;
  const soldCount = soldRows.filter(r => r["Sold Price"] > 0).length;
  const totalSoldRevenue = soldRows.reduce((s, r) => s + (r["Sold Price"] || 0), 0);
  const totalSoldNet = soldRows.reduce((s, r) => s + (r["Net Profit"] || 0), 0);

  const summaryData = [
    ["Legions Market — Collection Tax Report"],
    ["Generated", new Date().toLocaleDateString()],
    ["Date Range", dateFrom && dateTo ? `${dateFrom} to ${dateTo}` : dateFrom ? `From ${dateFrom}` : dateTo ? `Through ${dateTo}` : "All Time"],
    ["Currency", currency],
    [],
    ["COLLECTION OVERVIEW"],
    ["Figures Owned", ownedCount],
    ["Figures Sold", soldCount],
    [],
    ["PURCHASE SUMMARY"],
    ["Total Spent (Price Paid)", totalPurchases],
    [],
    ["COMPLETED SALES"],
    ["Figures Sold", soldCount],
    ["Total Revenue", totalSoldRevenue],
    ["Net Profit from Sales", totalSoldNet],
    [],
    ["ACTIVE LISTINGS"],
    ["Total Asking Value", totalAsking],
    [],
    ["Note: This report is for informational purposes only."],
    ["Consult a tax professional for official tax filings."]
  ];
  const wsSum = XLSX.utils.aoa_to_sheet(summaryData);
  wsSum["!cols"] = [{ wch: 35 }, { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, wsSum, "Summary");

  const suffix = dateFrom && dateTo ? `${dateFrom}_to_${dateTo}` : new Date().getFullYear();
  XLSX.writeFile(wb, `LM_Tax_Report_${suffix}.xlsx`);
}

// ─── COMPLETE FIGURE CATALOG ───
let FIGURES_DB = [];

// ─── GENERATE SALES DATA ───
function generateSalesData(fig) {
  const rng = (s) => { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; } return Math.abs(h); };
  const code = fig.code || fig.sku || fig.name || "unknown";
  const seed = rng(code);
  const sales = [];
  const baseMultiplier = 0.8 + ((seed % 100) / 100) * 1.2;
  const months = ["2025-10", "2025-11", "2025-12", "2026-01", "2026-02", "2026-03"];
  const conditions = ["New/Sealed", "Opened/Displayed", "Like New", "Very Good"];
  const condMult = { "New/Sealed": 1.0, "Opened/Displayed": 0.88, "Like New": 0.82, "Very Good": 0.70 };
  const regions = ["US", "US", "US", "EU", "UK", "Asia", "Asia"];
  months.forEach((m, mi) => {
    const numSales = 3 + (seed + mi) % 5;
    for (let i = 0; i < numSales; i++) {
      const cond = conditions[(seed + i + mi) % conditions.length];
      const trendFactor = 1 + (mi - 3) * 0.02 * (seed % 2 === 0 ? 1 : -1);
      const noise = 0.9 + ((seed * (i + 1) * (mi + 1)) % 200) / 1000;
      const price = Math.round(fig.retail * baseMultiplier * condMult[cond] * trendFactor * noise * 100) / 100;
      const day = 1 + ((seed + i * 3 + mi * 7) % 28);
      sales.push({ date: `${m}-${String(day).padStart(2, "0")}`, price, condition: cond, type: (seed + i) % 4 === 0 ? "Auction" : "Buy It Now", region: regions[(seed + i) % regions.length] });
    }
  });
  return sales.sort((a, b) => b.date.localeCompare(a.date));
}

// ─── STATS CALCULATION ───
function calcStats(fig, regionFilter) {
  const allSales = generateSalesData(fig);
  const sales = regionFilter && regionFilter !== "Global" ? allSales.filter(s => s.region === regionFilter) : allSales;
  if (sales.length === 0) return calcStats(fig);
  const prices = sales.map((s) => s.price);
  const newPrices = sales.filter((s) => s.condition === "New/Sealed").map((s) => s.price);
  const usedPrices = sales.filter((s) => s.condition !== "New/Sealed").map((s) => s.price);
  const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
  const avgNew = newPrices.length ? newPrices.reduce((a, b) => a + b, 0) / newPrices.length : avg;
  const avgUsed = usedPrices.length ? usedPrices.reduce((a, b) => a + b, 0) / usedPrices.length : avg * 0.85;
  const mid = Math.floor(sales.length / 2);
  const earlyAvg = sales.slice(mid).reduce((a, s) => a + s.price, 0) / Math.max(sales.length - mid, 1);
  const lateAvg = sales.slice(0, mid).reduce((a, s) => a + s.price, 0) / Math.max(mid, 1);
  const trendPct = ((lateAvg - earlyAvg) / earlyAvg) * 100;
  const trend = trendPct > 3 ? "rising" : trendPct < -3 ? "falling" : "stable";
  const roi = ((avg - fig.retail) / fig.retail) * 100;
  const monthlyData = {};
  sales.forEach((s) => {
    const m = s.date.substring(0, 7);
    if (!monthlyData[m]) monthlyData[m] = [];
    monthlyData[m].push(s.price);
  });
  const chartData = Object.keys(monthlyData).sort().map((m) => {
    const p = monthlyData[m];
    return { month: m.substring(5), avg: Math.round(p.reduce((a, b) => a + b, 0) / p.length), sales: p.length };
  });
  return {
    avg: Math.round(avg), avgNew: Math.round(avgNew), avgUsed: Math.round(avgUsed),
    low: Math.round(Math.min(...prices)), high: Math.round(Math.max(...prices)),
    totalSales: sales.length, trend, trendPct: Math.round(trendPct * 10) / 10,
    roi: Math.round(roi * 10) / 10, chartData, sales,
    fairBuyNew: Math.round(avgNew * 0.95), fairBuyUsed: Math.round(avgUsed * 0.95),
    fairSellNew: Math.round(avgNew * 1.02), fairSellUsed: Math.round(avgUsed * 1.02),
  };
}

function TaxReportModal({ onClose, onExport }) {
  const now = new Date();
  const yearStart = `${now.getFullYear()}-01-01`;
  const today = now.toISOString().split("T")[0];
  const [dateFrom, setDateFrom] = useState(yearStart);
  const [dateTo, setDateTo] = useState(today);
  const [preset, setPreset] = useState("ytd");

  const applyPreset = (p) => {
    setPreset(p);
    const d = new Date();
    if (p === "ytd") { setDateFrom(`${d.getFullYear()}-01-01`); setDateTo(today); }
    else if (p === "last-year") { setDateFrom(`${d.getFullYear()-1}-01-01`); setDateTo(`${d.getFullYear()-1}-12-31`); }
    else if (p === "last-90") { const f = new Date(d); f.setDate(f.getDate()-90); setDateFrom(f.toISOString().split("T")[0]); setDateTo(today); }
    else if (p === "all") { setDateFrom(""); setDateTo(""); }
  };

  return React.createElement("div", {
    className: "fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] p-4",
    onClick: (e) => { if (e.target === e.currentTarget) onClose(); }
  },
    React.createElement("div", { className: "bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-md space-y-5" },
      React.createElement("div", { className: "flex items-center justify-between" },
        React.createElement("h2", { className: "text-xl font-bold text-white" }, "Export Tax Report"),
        React.createElement("button", { onClick: onClose, className: "text-gray-400 hover:text-white text-2xl leading-none" }, "\u00d7")
      ),
      React.createElement("div", { className: "space-y-3" },
        React.createElement("label", { className: "text-sm text-gray-400 block" }, "Date Range"),
        React.createElement("div", { className: "flex flex-wrap gap-2" },
          ...[
            { id: "ytd", label: "Year to Date" },
            { id: "last-year", label: "Last Year" },
            { id: "last-90", label: "Last 90 Days" },
            { id: "all", label: "All Time" },
            { id: "custom", label: "Custom" }
          ].map(p => React.createElement("button", {
            key: p.id,
            onClick: () => applyPreset(p.id),
            className: `px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${preset === p.id ? "bg-indigo-500/30 border-indigo-500 text-indigo-300" : "bg-gray-800 border-gray-700 text-gray-400 hover:text-white"}`,
            style: { border: `1px solid ${preset === p.id ? "rgba(99,102,241,0.5)" : "rgba(55,65,81,1)"}` }
          }, p.label))
        )
      ),
      (preset === "custom" || (preset !== "all")) && React.createElement("div", { className: "grid grid-cols-2 gap-3" },
        React.createElement("div", null,
          React.createElement("label", { className: "text-xs text-gray-500 block mb-1" }, "From"),
          React.createElement("input", {
            type: "date", value: dateFrom,
            onChange: (e) => { setDateFrom(e.target.value); setPreset("custom"); },
            className: "w-full bg-gray-800 border border-gray-700 rounded-lg text-sm text-white px-3 py-2 focus:outline-none focus:border-indigo-500/50"
          })
        ),
        React.createElement("div", null,
          React.createElement("label", { className: "text-xs text-gray-500 block mb-1" }, "To"),
          React.createElement("input", {
            type: "date", value: dateTo,
            onChange: (e) => { setDateTo(e.target.value); setPreset("custom"); },
            className: "w-full bg-gray-800 border border-gray-700 rounded-lg text-sm text-white px-3 py-2 focus:outline-none focus:border-indigo-500/50"
          })

      ),
      React.createElement("p", { className: "text-xs text-gray-500" },
        preset === "all" ? "Includes all purchases, sales, and listings regardless of date." : `Report will include transactions from ${dateFrom || "earliest"} to ${dateTo || "today"}.`
      ),
      React.createElement("button", {

// ─── FEEDBACK MODAL ───
function FeedbackModal({ onClose }) {
  const [fbCategory, setFbCategory] = useState("bug");
  const [fbMessage, setFbMessage] = useState("");
  const [fbFigure, setFbFigure] = useState("");
  const [fbStatus, setFbStatus] = useState(null);

  const handleSubmit = async () => {
    if (fbMessage.trim().length < 10) { setFbStatus("short"); return; }
    setFbStatus("sending");
    try {
      const resp = await fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          category: fbCategory,
          message: fbMessage.trim(),
          figureCode: fbFigure.trim() || null,
          userAgent: navigator.userAgent
        })
      });
      if (resp.ok) {
        setFbStatus("success");
        setTimeout(onClose, 2000);
      } else { setFbStatus("error"); }
    } catch { setFbStatus("error"); }
  };

  return (
    <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4" style={{ background: "var(--bg-modal)" }} onClick={onClose}>
      <div className="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-md shadow-2xl" onClick={(e) => e.stopPropagation()}>

          <button onClick={onClose} className="text-gray-400 hover:text-white text-xl">&times;</button>
        </div>

        {fbStatus === "success" ? (
          <div className="text-center py-8">
            <div className="text-3xl mb-2 text-green-400">✓</div>
            <p className="text-green-400 font-semibold">Thank you! Your feedback has been submitted.</p>
          </div>
        ) : (
          <>
            <div className="mb-3">
              <label className="text-xs text-gray-400 block mb-1">Category</label>
              <select value={fbCategory} onChange={(e) => setFbCategory(e.target.value)}
                className="w-full bg-gray-800 border border-gray-700 rounded-lg text-sm text-white px-3 py-2 focus:outline-none focus:border-orange-500/50">
                <option value="bug">Bug Report</option>
                <option value="feature">Feature Request</option>
                <option value="data">Data Error (wrong price, missing figure, etc.)</option>
                <option value="other">Other Feedback</option>
              </select>
            </div>

            <div className="mb-3">
              <label className="text-xs text-gray-400 block mb-1">Figure Code (optional)</label>
              <input type="text" value={fbFigure} onChange={(e) => setFbFigure(e.target.value)}
                placeholder="e.g. ML001, CL002"
                className="w-full bg-gray-800 border border-gray-700 rounded-lg text-sm text-white px-3 py-2 focus:outline-none focus:border-orange-500/50" />
            </div>

            <div className="mb-4">
              <label className="text-xs text-gray-400 block mb-1">Message</label>
              <textarea value={fbMessage} onChange={(e) => setFbMessage(e.target.value)}
                placeholder="Describe the issue or suggestion..."
                rows={4}
                className="w-full bg-gray-800 border border-gray-700 rounded-lg text-sm text-white px-3 py-2 focus:outline-none focus:border-orange-500/50 resize-none" />
              {fbStatus === "short" && (
                <p className="text-red-400 text-xs mt-1">Please enter at least 10 characters.</p>
              )}
              {fbStatus === "error" && (
                <p className="text-red-400 text-xs mt-1">Something went wrong. Please try again.</p>
              )}
            </div>

            <button onClick={handleSubmit} disabled={fbStatus === "sending"}
              className="w-full py-2.5 rounded-lg font-semibold text-sm transition-all"
              style={{ background: fbStatus === "sending" ? "#666" : "#F27B1A", color: "#0D0D14" }}>
              {fbStatus === "sending" ? "Submitting..." : "Submit Feedback"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── FAIR PRICE GAUGE ───
function FairPriceGauge({ price, low, avg, high, label, currency }) {
  const range = high - low || 1;
  const pct = Math.max(0, Math.min(100, ((price - low) / range) * 100));
  const avgPct = ((avg - low) / range) * 100;
  return (
    <div className="mb-3">
      <div className="flex justify-between text-xs text-gray-400 mb-1">
        <span>{label}</span>
        <span className="font-bold" style={{ color: "#F27B1A" }}>{formatPrice(price, currency)}</span>
      </div>
      <div className="relative h-2 bg-gray-700 rounded-full overflow-hidden">
        <div className="absolute inset-0 rounded-full" style={{ background: "linear-gradient(90deg, #22C55E 0%, #E8A020 50%, #EF4444 100%)" }} />
        <div className="absolute top-0 h-full w-0.5 bg-white" style={{ left: `${avgPct}%` }} title={`Avg: $${avg}`} />
      </div>
      <div className="flex justify-between text-xs text-gray-500 mt-0.5">
        <span>{formatPrice(low, currency)}</span>
        <span>{formatPrice(high, currency)}</span>
      </div>
    </div>
  );
}

// ─── COMPARE DRAWER ───
function CompareDrawer({ figures, allStats, onRemove, onClose, currency }) {
  if (!figures || figures.length === 0) return null;
  const stats = figures.map(f => allStats[f.sku || f.id] || calcStats(f));
  const [expanded, setExpanded] = useState(figures.length === 2);

  useEffect(() => { if (figures.length === 2) setExpanded(true); }, [figures.length]);

  const rows = [
    { label: "Market Value", fn: (s) => formatPrice(s.avg, currency), color: (s) => "#F27B1A", higherBetter: true },
    { label: "New/Sealed", fn: (s) => formatPrice(s.avgNew, currency), color: () => "#22C55E", higherBetter: true },
    { label: "Used/Open", fn: (s) => formatPrice(s.avgUsed, currency), color: () => "#3B82F6", higherBetter: true },
    { label: "ROI", fn: (s) => (s.roi > 0 ? "+" : "") + s.roi + "%", color: (s) => s.roi > 0 ? "#22C55E" : "#EF4444", higherBetter: true },
    { label: "Trend", fn: (s) => s.trend.charAt(0).toUpperCase() + s.trend.slice(1) + " (" + (s.trendPct > 0 ? "+" : "") + s.trendPct + "%)", color: (s) => s.trend === "rising" ? "#22C55E" : s.trend === "falling" ? "#EF4444" : "#888" },
    { label: "Total Sales", fn: (s) => String(s.totalSales), color: () => "#FFF", higherBetter: true },
    { label: "Low", fn: (s) => formatPrice(s.low, currency), color: () => "#9CA3AF" },
    { label: "High", fn: (s) => formatPrice(s.high, currency), color: () => "#9CA3AF" },
    { label: "Fair Buy (New)", fn: (s) => formatPrice(s.fairBuyNew, currency), color: () => "#22C55E", higherBetter: false },
    { label: "Fair Sell (New)", fn: (s) => formatPrice(s.fairSellNew, currency), color: () => "#F27B1A", higherBetter: true },
  ];

  const betterIdx = (vals, higherBetter) => {
    if (figures.length < 2 || higherBetter === undefined) return -1;
    const nums = vals.map(v => parseFloat(String(v).replace(/[^0-9.-]/g, '')));
    if (isNaN(nums[0]) || isNaN(nums[1]) || nums[0] === nums[1]) return -1;
    return higherBetter ? (nums[0] > nums[1] ? 0 : 1) : (nums[0] < nums[1] ? 0 : 1);
  };

  if (figures.length === 1 && !expanded) {
    return (
      <div className="fixed bottom-0 inset-x-0 z-40" style={{ pointerEvents: "none" }}>
        <div className="max-w-2xl mx-auto px-4 pb-4" style={{ pointerEvents: "auto" }}>
          <div className="rounded-xl shadow-2xl border border-purple-500/40 overflow-hidden" style={{ background: "rgba(17,24,39,0.97)", backdropFilter: "blur(16px)" }}>
            <div className="px-4 py-3 flex items-center gap-3">
              <div className="w-10 h-12 bg-gray-800 rounded-lg overflow-hidden flex-shrink-0">
                <FigureImage code={figures[0].code || figures[0].sku} name={figures[0].name} className="w-full h-full object-cover" />
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-bold text-white truncate">{figures[0].name}</p>
                <p className="text-xs text-purple-400">Click "Compare" on another figure to compare side-by-side</p>
              </div>
              <button onClick={() => setExpanded(true)} className="px-3 py-1.5 rounded-lg text-xs font-semibold border border-gray-700 text-gray-400 hover:text-white hover:border-gray-500 flex-shrink-0">
                Expand
              </button>
              <button onClick={onClose} className="p-1.5 rounded-full hover:bg-gray-800 text-gray-500 hover:text-white flex-shrink-0"><X className="w-4 h-4" /></button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-3 sm:p-6" style={{ background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)" }}>
      <div className="bg-gray-900 border border-purple-500/30 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-800">
          <div className="flex items-center gap-2">
            <Layers className="w-5 h-5 text-purple-400" />
            <h3 className="text-base font-bold text-white">Compare Figures</h3>
            <span className="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded-full">{figures.length}/2</span>
          </div>
          <button onClick={onClose} className="p-2 rounded-full hover:bg-gray-800 text-gray-400 hover:text-white transition-colors"><X className="w-5 h-5" /></button>
        </div>

        <div className="px-5 py-4 border-b border-gray-800 flex gap-4">
          {figures.map((fig, i) => (
            <div key={fig.id} className="flex-1 flex items-center gap-3 bg-gray-800/50 rounded-xl p-3 border border-gray-700/50">
              <div className="w-14 h-16 bg-gray-800 rounded-lg overflow-hidden flex-shrink-0">
                <FigureImage code={fig.code || fig.sku} name={fig.name} className="w-full h-full object-cover" />
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-bold text-white truncate">{fig.name}</p>
                <p className="text-xs text-gray-500">{fig.code || fig.sku}</p>
              </div>
              <button onClick={() => onRemove(fig.id)} className="p-1 rounded-full hover:bg-red-500/20 text-gray-600 hover:text-red-400 flex-shrink-0 transition-colors" title="Remove"><X className="w-3.5 h-3.5" /></button>
            </div>
          ))}
          {figures.length < 2 && (
            <div className="flex-1 flex items-center justify-center border-2 border-dashed border-gray-700 rounded-xl p-3 text-gray-500 gap-2">
              <Plus className="w-4 h-4" />
              <span className="text-sm">Open a figure and click Compare</span>
            </div>
          )}
        </div>

        <div className="flex-1 overflow-x-auto overflow-y-auto">
          <table className="w-full" style={{ borderCollapse: "separate", borderSpacing: 0 }}>
            <thead>
              <tr className="sticky top-0" style={{ background: "#111827" }}>
                <th className="text-left text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 sm:px-5 py-2 sm:py-2.5 border-b border-gray-800 w-1/3">Metric</th>
                {figures.map((fig) => (
                  <th key={fig.id || fig.sku} className="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 sm:px-4 py-2 sm:py-2.5 border-b border-gray-800">{fig.code || fig.sku}</th>
                ))}
                {figures.length < 2 && <th className="text-center text-xs text-gray-600 px-2 sm:px-4 py-2 sm:py-2.5 border-b border-gray-800">—</th>}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, ri) => {
                const vals = stats.map(s => row.fn(s));
                const best = betterIdx(vals, row.higherBetter);
                return (
                  <tr key={row.label} className={ri % 2 === 0 ? "bg-gray-800/20" : ""}>
                    <td className="text-xs sm:text-sm text-gray-400 font-medium px-2 sm:px-5 py-2 sm:py-2.5">{row.label}</td>
                    {figures.map((fig, fi) => (
                      <td key={fig.id} className="text-center px-2 sm:px-4 py-2 sm:py-2.5">
                        <span className="text-xs sm:text-sm font-bold" style={{ color: row.color(stats[fi]) }}>{vals[fi]}</span>
                        {best === fi && <span className="ml-1 sm:ml-1.5 text-green-400 text-xs">★</span>}
                      </td>
                    ))}
                    {figures.length < 2 && <td className="text-center text-gray-700 px-2 sm:px-4 py-2 sm:py-2.5">—</td>}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── FIREBASE TRACKING HELPERS ───
const FB_DB = window.firebaseDb;

function fbTrackCollectionEvent(sku, status, prevStatus) {
  // Anonymous aggregate counters (no personal data) — no consent required
  if (!FB_DB) return;
  const ref = FB_DB.ref('lm_collection_events/' + sku);
  ref.transaction((current) => {
    if (!current) current = { owned: 0, preorder: 0, wishlist: 0 };
    // Decrement previous status if set
    if (prevStatus && current[prevStatus] !== undefined) {
      current[prevStatus] = Math.max(0, (current[prevStatus] || 0) - 1);
    }
    // Increment new status if set
    if (status && current[status] !== undefined) {
      current[status] = (current[status] || 0) + 1;
    }
    return current;
  });
}

function fbGetAggregateData() {
  if (!FB_DB) return Promise.resolve({});
  return FB_DB.ref('lm_collection_events').once('value').then(snap => snap.val() || {});
}

// ─── COLLECTION MANAGER FUNCTIONS ───
function getCollectionMap() {
  return JSON.parse(localStorage.getItem("lm-collection-map") || "{}");
}

function setCollectionMap(map) {
  localStorage.setItem("lm-collection-map", JSON.stringify(map));
}

function toggleCollection(sku, newStatus) {
  const map = getCollectionMap();
  const current = map[sku];
  if (current === newStatus) {
    delete map[sku];
    fbTrackCollectionEvent(sku, null, current);
  } else {
    map[sku] = newStatus;
    fbTrackCollectionEvent(sku, newStatus, current || null);
  }
  setCollectionMap(map);
  return map;
}

              <th className="text-left py-2 px-3 text-gray-400 font-semibold">Code</th>
              <th className="text-left py-2 px-3 text-gray-400 font-semibold">Name</th>
              <th className="text-left py-2 px-3 text-gray-400 font-semibold">Series</th>
              <th className="text-right py-2 px-3 text-gray-400 font-semibold">Retail</th>
              <th className="text-right py-2 px-3 text-gray-400 font-semibold">Market Avg</th>
            </tr>
          </thead>
          <tbody>
            {CATALOG.map(fig => {
              const stats = statsForFigure(fig.sku);
              return (
                <tr key={fig.sku} className="border-b border-gray-700 hover:bg-gray-800/50 cursor-pointer" onClick={() => setShowDetail(fig)}>
                  <td className="py-2 px-3 text-white font-mono text-xs">{fig.code || fig.sku}</td>
                  <td className="py-2 px-3 text-white">{fig.name}</td>
                  <td className="py-2 px-3 text-gray-400 text-xs">{fig.series}</td>
                  <td className="py-2 px-3 text-right text-gray-400">{formatPrice(fig.retail, currency)}</td>
                  <td className="py-2 px-3 text-right font-bold text-orange-400">{stats ? formatPrice(stats.avg, currency) : "—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );

  const tabContents = {
    browse: renderBrowse(),
    wishlist: renderWishlist(),
    collection: renderCollection(),
    catalog: renderCatalog()
  };

  return (
    <div style={{ background: "var(--bg-main)" }} className="min-h-screen text-white">
      {/* Header */}
      <header className="sticky top-0 z-40 border-b border-gray-800/80" style={{ background: "var(--bg-header)", backdropFilter: "blur(12px)" }}>
        <div className="max-w-7xl mx-auto px-2 sm:px-4 py-2 sm:py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2 sm:gap-3">
              <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background: "linear-gradient(135deg, #F27B1A, #D46A10)" }}>
                <Package className="w-5 h-5 text-gray-900" />
              </div>
              <div className="hidden sm:block">
                <h1 className="text-lg font-bold text-white tracking-tight">Legions Market</h1>
                <p className="text-xs text-gray-500 -mt-0.5">Collect Smarter</p>
              </div>
            </div>
            <nav className="flex items-center gap-0.5 sm:gap-1">
              {/* Desktop nav tabs — hidden on mobile, shown on sm+ */}
              {[
                { id: "browse", label: "Market", icon: BarChart3 },
                { id: "catalog", label: "Catalog", icon: BookOpen },
                { id: "wishlist", label: `Wishlist (${Object.values(collectionMap).filter(s => s === "wishlist").length})`, icon: Star },
                { id: "collection", label: `Collection (${Object.values(collectionMap).filter(s => s === "owned" || s === "preorder").length})`, icon: Package },
              ].map((tab) => (
                <button key={tab.id} onClick={() => setView(tab.id)}
                  className="hidden sm:flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white hover:bg-gray-800/50" style={view === tab.id ? { background: "rgba(242, 123, 26, 0.15)", color: "#F27B1A" } : {}}>
                  <tab.icon className="w-4 h-4" />
                  <span>{tab.label}</span>
                </button>
              ))}
              <select value={currency} onChange={(e) => changeCurrency(e.target.value)}
                className="bg-gray-800 border border-gray-700 rounded-lg text-xs text-white px-1 sm:px-2 py-1.5 ml-1 sm:ml-3 focus:outline-none focus:border-orange-500/50"
                title="Currency">
                {Object.entries(CURRENCIES).map(([code, c]) => (
                  <option key={code} value={code}>{c.symbol} {code}</option>
                ))}
              </select>
              <select value={region} onChange={(e) => changeRegion(e.target.value)}
                className="bg-gray-800 border border-gray-700 rounded-lg text-xs text-white px-1 sm:px-2 py-1.5 ml-1 focus:outline-none focus:border-orange-500/50"
                title="Market Region">
                {Object.entries(REGIONS).map(([code, r]) => (
                  <option key={code} value={code}>{r.flag} {r.label}</option>
                ))}
              </select>
              <button onClick={() => setShowScanModal(true)}
                className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1.5 rounded-lg text-sm font-medium transition-all ml-1 sm:ml-2"
                style={{ background: "rgba(242, 123, 26, 0.15)", border: "1px solid rgba(242, 123, 26, 0.5)", color: "#F27B1A" }}
                title="Scan barcode or add custom figure">
                <Camera className="w-4 h-4" /><span className="hidden sm:inline">Scan / Add</span>
              </button>
              <button onClick={toggleTheme}
                className="hidden sm:flex items-center justify-center w-9 h-9 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800/50 transition-all ml-1 sm:ml-2"
                title={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}>
                {theme === 'dark' ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
              </button>
            </nav>
          </div>
        </div>
      </header>

      {/* Mobile Bottom Tab Bar — visible only on small screens */}
      <nav className="sm:hidden fixed bottom-0 left-0 right-0 z-50 border-t border-gray-800/80" style={{ background: "var(--bg-header)", backdropFilter: "blur(12px)", paddingBottom: "env(safe-area-inset-bottom)" }}>
        <div className="flex items-center justify-around px-1 py-1.5">
          {[
            { id: "browse", label: "Market", icon: BarChart3, count: null },
            { id: "catalog", label: "Catalog", icon: BookOpen, count: null },
            { id: "wishlist", label: "Wishlist", icon: Star, count: Object.values(collectionMap).filter(s => s === "wishlist").length },
            { id: "collection", label: "Collection", icon: Package, count: Object.values(collectionMap).filter(s => s === "owned" || s === "preorder").length },
          ].map((tab) => (
            <button key={tab.id} onClick={() => setView(tab.id)}
              className="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg transition-all relative"
              style={view === tab.id ? { color: "#F27B1A" } : { color: "rgba(156,163,175,1)" }}>
              <div className="relative">
                <tab.icon className="w-5 h-5" />
                {tab.count > 0 && (
                  <span className="absolute -top-1.5 -right-2.5 min-w-[16px] h-4 flex items-center justify-center rounded-full text-[10px] font-bold text-white px-1" style={{ background: "#F27B1A" }}>
                    {tab.count}
                  </span>
                )}
              </div>
              <span className="text-[10px] font-medium">{tab.label}</span>
            </button>
          ))}
          <button onClick={toggleTheme}
            className="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg transition-all text-gray-400">
            {theme === 'dark' ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
            <span className="text-[10px] font-medium">Theme</span>
          </button>
        </div>
      </nav>

      {/* Price Alert Banner */}
      {(() => {
        const alerts = Object.entries(wishlistTargets).filter(([sku, target]) => {
          if (!target || dismissedAlerts.includes(sku)) return false;
          const fig = FIGURES_DB.find(f => f.code === sku);
          if (!fig) return false;
          const stats = allStats[fig.id];
          return stats && stats.avg <= target;
        }).map(([sku, target]) => {
          const fig = FIGURES_DB.find(f => f.code === sku);
          const stats = allStats[fig?.id];
          const catItem = CATALOG.find(c => c.sku === sku);
          return { sku, name: catItem?.name || fig?.name, market: stats?.avg, target, figure: fig };
        });
        if (alerts.length === 0) return null;
        return (
          <div className="border-b border-green-500/30" style={{ background: "rgba(34, 197, 94, 0.08)" }}>
            <div className="max-w-7xl mx-auto px-3 sm:px-4 py-2 sm:py-2.5">
              <div className="flex items-start gap-2 sm:gap-3">
                <div className="flex items-center gap-1.5 sm:gap-2 flex-shrink-0 mt-0.5">
                  <div className="w-5 h-5 sm:w-6 sm:h-6 rounded-full bg-green-500/20 flex items-center justify-center">
                    <TrendingDown className="w-3 h-3 sm:w-3.5 sm:h-3.5 text-green-400" />
                  </div>
                  <span className="text-xs font-bold text-green-400 uppercase tracking-wide hidden sm:inline">Price Alert</span>
                </div>
                <div className="flex-1 flex flex-wrap gap-1.5 sm:gap-2 overflow-hidden">
                  {alerts.map(a => (
                    <button key={a.sku} onClick={() => setSelectedFigure(a.figure)}
                      className="flex items-center gap-1.5 sm:gap-2 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg bg-green-500/10 border border-green-500/30 hover:bg-green-500/20 transition cursor-pointer group min-w-0">
                      <span className="text-xs sm:text-sm font-semibold text-white truncate max-w-[120px] sm:max-w-none">{a.name}</span>
                      <span className="text-xs text-green-400 font-bold whitespace-nowrap">{formatPrice(a.market, currency)}</span>
                      <span className="text-xs text-gray-500 whitespace-nowrap hidden sm:inline">(target: {formatPrice(a.target, currency)})</span>
                      <X className="w-3 h-3 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition flex-shrink-0" onClick={(e) => { e.stopPropagation(); setDismissedAlerts(prev => [...prev, a.sku]); }} />
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Content */}
      <main className="max-w-7xl mx-auto px-2 sm:px-4 py-4 sm:py-6 pb-20 sm:pb-6">
        {view === "browse" && renderBrowse()}
        {view === "catalog" && renderCatalog()}
        {view === "wishlist" && renderWishlist()}
        {view === "collection" && renderCollection()}
      </main>

      {/* Detail Modal */}
      {showDetail && (
        <DetailModal
          figure={showDetail}
          stats={statsForFigure(showDetail.sku) || calcStats(showDetail)}
          inCollection={collectionMap[showDetail.sku] === "wishlist"}
          onToggleCollection={() => handleToggleCollection(showDetail.sku, "wishlist")}
          onClose={() => setShowDetail(null)}
          currency={currency}
          onCompare={addToCompare}
          isInCompare={compareFigures.some(f => f.sku === showDetail.sku)}
          watchPrice={wishlistTargets[showDetail.sku]}
          onSetWatch={handleSetWatchPrice}
          region={region}
          communityData={communityData[showDetail.sku]}
        />
      )}

      {/* Compare Drawer */}
      {compareFigures.length > 0 && (
        <CompareDrawer
          figures={compareFigures}
          allStats={allStats}
          onRemove={removeFromCompare}
          onClose={() => setCompareFigures([])}
          currency={currency}
        />
      )}

      {/* Modals */}
      {showFeedback && <FeedbackModal onClose={() => setShowFeedback(false)} />}
      {showPrivacy && <PrivacyPolicyModal onClose={() => setShowPrivacy(false)} />}
      {showTaxReport && <TaxReportModal onClose={() => setShowTaxReport(false)} onExport={handleExportTaxReport} />}
      {showConsent && <ConsentBanner onAccept={() => { setShowConsent(false); localStorage.setItem("lm-consent-shown", "1"); }} onDecline={() => { setShowConsent(false); localStorage.setItem("lm-consent-shown", "1"); }} />}
    </div>
  );
}

// ─── RENDER APP ───
const root = window.ReactDOM.createRoot(document.getElementById('root'));
root.render(<LegionsMarket />);
    </script>
</body>
</html>
